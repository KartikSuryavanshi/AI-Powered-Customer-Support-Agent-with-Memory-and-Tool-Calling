services:
  api:
    image: ${API_IMAGE}
    env_file:
      - .env
    volumes:
      - support_data:/data
    restart: unless-stopped

  dashboard:
    image: ${DASH_IMAGE}
    env_file:
      - .env
    environment:
      STREAMLIT_API_BASE_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - dashboard
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  support_data:
