services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    volumes:
      - ./:/app
      - support_data:/app/chroma
    ports:
      - "8000:8000"
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    env_file:
      - .env
    environment:
      STREAMLIT_API_BASE_URL: http://api:8000
    volumes:
      - ./:/app
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - dashboard
    restart: unless-stopped

volumes:
  support_data:
